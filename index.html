<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Beat the Stickman: Cash Clicker 💸🤖</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #0f172a;
            display: flex; flex-direction: row; font-family: 'Segoe UI', sans-serif;
            color: white; overflow: hidden; height: 100vh;
        }
        
        /* Zona de juego */
        #game-container {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }
        canvas {
            background: #111827; /* Fondo ultra oscuro para que resalte */
            border: 4px solid #475569; border-radius: 16px; cursor: crosshair;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* Tienda Lateral */
        #shop-panel {
            width: 320px; background-color: #1e293b; border-left: 4px solid #334155;
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
            box-shadow: -10px 0 20px rgba(0,0,0,0.3); z-index: 10;
        }
        .shop-title { font-size: 22px; font-weight: bold; color: #facc15; text-align: center; margin-bottom: 10px; }
        
        .shop-item {
            background-color: #334155; padding: 12px; border-radius: 10px;
            display: flex; justify-content: space-between; align-items: center;
            border: 2px solid transparent; transition: all 0.2s;
        }
        .shop-item:hover { border-color: #38bdf8; background-color: #3f51b5; }
        
        .buy-btn {
            background-color: #22c55e; color: white; border: none; padding: 8px 12px;
            border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .buy-btn:hover { background-color: #16a34a; transform: scale(1.05); }
        .buy-btn:disabled { background-color: #64748b; cursor: not-allowed; transform: none; }

        #wallet {
            font-size: 28px; font-weight: 800; color: #facc15; text-align: center;
            background-color: #0f172a; padding: 10px; border-radius: 12px; border: 2px solid #334155;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div style="margin-bottom: 10px; font-size: 18px; color: #38bdf8; font-weight: bold;">
            💥 ¡HAZ CLIC EN LA CABEZA ROJA DEL STICKMAN! 💥
        </div>
        <canvas id="gameCanvas" width="750" height="500"></canvas>
    </div>

    <div id="shop-panel">
        <div class="shop-title">💰 BANCO Y MEJORAS</div>
        <div id="wallet">$0</div>
        
        <hr style="border-color: #334155; width: 100%;">
        <div style="color: #94a3b8; font-size: 14px; font-weight: bold;">ARMAS AUTOMÁTICAS:</div>

        <div class="shop-item">
            <div>
                <div style="font-weight:bold;">Pinchos de Suelo</div>
                <div style="font-size:12px; color:#38bdf8;">Daño pasivo: +$2/s</div>
            </div>
            <button id="btn-pinchos" class="buy-btn" onclick="buyUpgrade('pinchos', 50)">$50</button>
        </div>

        <div class="shop-item">
            <div>
                <div style="font-weight:bold;">Torreta Láser</div>
                <div style="font-size:12px; color:#38bdf8;">Daño pasivo: +$10/s</div>
            </div>
            <button id="btn-laser" class="buy-btn" onclick="buyUpgrade('laser', 250)">$250</button>
        </div>

        <div class="shop-item">
            <div>
                <div style="font-weight:bold;">Gravedad Loca</div>
                <div style="font-size:12px; color:#38bdf8;">Agita al muñeco solo: +$45/s</div>
            </div>
            <button id="btn-gravedad" class="buy-btn" onclick="buyUpgrade('gravedad', 1000)">$1000</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let dinero = 0;
        let dineroPorSegundo = 0; // CORREGIDO: Sin el error de sintaxis anterior

        // --- ENTIDAD STICKMAN ---
        let stickman = {
            x: 375, y: 150,
            vx: 3, vy: 0,
            radius: 18, 
            gravity: 0.4,
            bounce: 0.75
        };

        let coins = [];

        // --- DETECTAR CLIC EN EL MUÑECO ---
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            // Revisamos si el clic le dio al cuerpo o cabeza del muñeco
            let dist = Math.hypot(mouseX - stickman.x, mouseY - (stickman.y + 20));
            
            if (dist < 65) {
                // Impulso físico violento hacia el lado contrario del clic
                stickman.vx = (stickman.x - mouseX) * 0.5 + (Math.random() - 0.5) * 4;
                stickman.vy = (stickman.y - mouseY) * 0.5 - 7; 

                dinero += 5;
                updateUI();
                spawnCoins(stickman.x, stickman.y, 4);
            }
        });

        function spawnCoins(x, y, count) {
            for(let i=0; i<count; i++) {
                coins.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: -Math.random() * 5 - 2,
                    alpha: 1
                });
            }
        }

        // --- TIENDA ---
        function buyUpgrade(type, cost) {
            if (dinero >= cost) {
                dinero -= cost;
                if(type === 'pinchos') dineroPorSegundo += 2;
                if(type === 'laser') dineroPorSegundo += 10;
                if(type === 'gravedad') dineroPorSegundo += 45;
                
                let nextCost = Math.round(cost * 1.5);
                let btn = document.getElementById(`btn-${type}`);
                btn.innerText = "$" + nextCost;
                btn.setAttribute("onclick", `buyUpgrade('${type}', ${nextCost})`);

                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('wallet').innerText = `$${dinero}`;
            
            // Chequear si alcanza el dinero para activar o desactivar botones
            document.getElementById('btn-pinchos').disabled = (dinero < parseInt(document.getElementById('btn-pinchos').innerText.replace('$','')));
            document.getElementById('btn-laser').disabled = (dinero < parseInt(document.getElementById('btn-laser').innerText.replace('$','')));
            document.getElementById('btn-gravedad').disabled = (dinero < parseInt(document.getElementById('btn-gravedad').innerText.replace('$','')));
        }

        // --- ACTUALIZAR MUNDO ---
        function updatePhysics() {
            stickman.vy += stickman.gravity;
            stickman.x += stickman.vx;
            stickman.y += stickman.vy;

            stickman.vx *= 0.99; // Fricción suave

            // Rebotes bordes derecho e izquierdo
            if (stickman.x - 25 < 0) { stickman.x = 25; stickman.vx = -stickman.vx * stickman.bounce; }
            if (stickman.x + 25 > canvas.width) { stickman.x = canvas.width - 25; stickman.vx = -stickman.vx * stickman.bounce; }
            
            // Rebotes techo y piso
            if (stickman.y - 20 < 0) { stickman.y = 20; stickman.vy = -stickman.vy * stickman.bounce; }
            if (stickman.y + 90 > canvas.height) { 
                stickman.y = canvas.height - 90; 
                stickman.vy = -stickman.vy * stickman.bounce; 
                if(Math.abs(stickman.vx) > 0.1) stickman.vx *= 0.85;
            }

            // Monedas animadas
            for (let i = coins.length - 1; i >= 0; i--) {
                let c = coins[i];
                c.vy += 0.25;
                c.x += c.vx;
                c.y += c.vy;
                c.alpha -= 0.02;
                if(c.alpha <= 0) coins.splice(i, 1);
            }
        }

        // --- DIBUJAR TODO ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Cuadrícula gris de fondo
            ctx.strokeStyle = "rgba(255, 255, 255, 0.03)";
            ctx.lineWidth = 1;
            for(let i=40; i<canvas.width; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
            for(let j=40; j<canvas.height; j+=40) { ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(canvas.width,j); ctx.stroke(); }

            // 1. Cabeza (¡Roja para que se note al instante!)
            ctx.fillStyle = "#ef4444";
            ctx.beginPath();
            ctx.arc(stickman.x, stickman.y, stickman.radius, 0, Math.PI * 2);
            ctx.fill();

            // Configuración de las líneas del cuerpo
            ctx.strokeStyle = "#f8fafc";
            ctx.lineWidth = 4;
            ctx.lineCap = "round";

            // 2. Torso
            ctx.beginPath();
            ctx.moveTo(stickman.x, stickman.y + stickman.radius);
            ctx.lineTo(stickman.x, stickman.y + 55);
            ctx.stroke();

            // 3. Brazos flexibles
            let sway = stickman.vx * 1.2;
            ctx.beginPath();
            ctx.moveTo(stickman.x, stickman.y + 24);
            ctx.lineTo(stickman.x - 22 + sway, stickman.y + 38);
            ctx.moveTo(stickman.x, stickman.y + 24);
            ctx.lineTo(stickman.x + 22 + sway, stickman.y + 38);
            ctx.stroke();

            // 4. Piernas
            ctx.beginPath();
            ctx.moveTo(stickman.x, stickman.y + 55);
            ctx.lineTo(stickman.x - 15 + (stickman.vx * 0.4), stickman.y + 85);
            ctx.moveTo(stickman.x, stickman.y + 55);
            ctx.lineTo(stickman.x + 15 + (stickman.vx * 0.4), stickman.y + 85);
            ctx.stroke();

            // Dibujar Monedas
            coins.forEach(c => {
                ctx.fillStyle = `rgba(250, 204, 21, ${c.alpha})`;
                ctx.beginPath();
                ctx.arc(c.x, c.y, 5, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // --- RELOJ DE DINERO AUTOMÁTICO ---
        setInterval(() => {
            if (dineroPorSegundo > 0) {
                dinero += dineroPorSegundo;
                updateUI();
                
                // Sacudida física automática por las armas adquiridas
                stickman.vx += (Math.random() - 0.5) * (dineroPorSegundo * 0.4);
                stickman.vy -= (Math.random()) * (dineroPorSegundo * 0.2);
                if(Math.random() > 0.5) spawnCoins(stickman.x, stickman.y + 20, 1);
            }
        }, 1000);

        // --- BUCLE PRINCIPAL ---
        function mainLoop() {
            updatePhysics();
            draw();
            updateUI();
            requestAnimationFrame(mainLoop);
        }

        mainLoop();
    </script>
</body>
</html>
